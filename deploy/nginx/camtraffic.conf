upstream camtraffic_backend {
  server backend:8000;
}

upstream camtraffic_ai_service {
  server ai-service:8001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# ── Admin portal ─────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.camtraffic.kh;

  root /var/www/admin;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://camtraffic_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    proxy_pass http://camtraffic_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ── User portal (officer + driver) ─────────────────────────────────────────────
server {
  listen 80;
  server_name app.camtraffic.kh;

  root /var/www/user;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://camtraffic_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    proxy_pass http://camtraffic_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ── Backend API ────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name api.camtraffic.kh;

  location / {
    proxy_pass http://camtraffic_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}

# ── AI service ─────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name ai.camtraffic.kh;

  location / {
    proxy_pass http://camtraffic_ai_service;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}

