# CamTraffic — production stack (8 services)
# Usage:
#   cp deploy/env/.env.production.example deploy/env/.env.production
#   npm run docker:prod:up
#
# App roles (API + Celery + AI worker) share one image to avoid rebuilding
# the heavy torch stack four times on Docker Desktop.

x-app-image: &app-image
  image: camtraffic-app:prod
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile.backend.prod
    args:
      BUILDKIT_INLINE_CACHE: 1

x-app-env: &app-env
  DOCKER: '1'
  USE_SQLITE: 'False'
  USE_REDIS: 'True'
  DB_HOST: postgres
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-camtraffic_db}
      POSTGRES_USER: ${DB_USER:-camtraffic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-camtraffic} -d ${DB_NAME:-camtraffic_db}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      <<: *app-env
    volumes:
      - media:/app/backend/media
      - app_logs:/app/backend/logs
      - backups:/app/backend/backups
      - ../../ai/weights:/app/ai/weights:ro
    expose:
      - '8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn -c /app/deploy/gunicorn/gunicorn.conf.py camtraffic.wsgi:application"

  celery-worker:
    image: camtraffic-app:prod
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      <<: *app-env
    volumes:
      - media:/app/backend/media
      - app_logs:/app/backend/logs
      - ../../ai/weights:/app/ai/weights:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A camtraffic worker -l info -Q default,reports,notifications,ingest

  celery-beat:
    image: camtraffic-app:prod
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      DOCKER: '1'
      USE_SQLITE: 'False'
      DB_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/1
    command: celery -A camtraffic beat -l info
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

  ai-worker:
    image: camtraffic-app:prod
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      <<: *app-env
    volumes:
      - media:/app/backend/media
      - app_logs:/app/backend/logs
      - ../../ai/weights:/app/ai/weights:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A camtraffic worker -l info -Q ingest,default -c 1

  nginx:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.nginx.prod
      args:
        VITE_API_URL: https://${DOMAIN_API:-api.camtraffic.store}/api
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      DOMAIN_ROOT: ${DOMAIN_ROOT:-camtraffic.store}
      DOMAIN_WWW: ${DOMAIN_WWW:-www.camtraffic.store}
      DOMAIN_ADMIN: ${DOMAIN_ADMIN:-admin.camtraffic.store}
      DOMAIN_USER: ${DOMAIN_USER:-app.camtraffic.store}
      DOMAIN_API: ${DOMAIN_API:-api.camtraffic.store}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_started

  certbot:
    image: certbot/certbot:latest
    profiles: ['ssl']
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  pgdata:
  redisdata:
  media:
  app_logs:
  backups:
  certbot_www:
  certbot_certs:
