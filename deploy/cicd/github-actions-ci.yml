# Reference copy of the GitHub Actions workflow (Task 125)
# Canonical workflow: ../../.github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: npm run build:packages
      - run: npm run validate:all
      - run: pip install -r backend/requirements.dev.txt
      - run: npm run test:backend
      - run: npm run test:frontend
      - run: npm run typecheck

  docker-build:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/docker/Dockerfile.backend.prod .
      - run: docker build -f deploy/docker/Dockerfile.nginx.prod .
