# CamTraffic YOLOv11 v2 — Cambodia-tuned hyperparameters (Phase 9)
epochs: 50
patience: 20
imgsz: 640
batch: 8
device: cpu
optimizer: AdamW
lr0: 0.001
lrf: 0.01
cos_lr: true
warmup_epochs: 3
weight_decay: 0.0005
# Cambodia lighting / road conditions
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.5
degrees: 5.0
translate: 0.1
scale: 0.6
shear: 2.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.1
close_mosaic: 10
