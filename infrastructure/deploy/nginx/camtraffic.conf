# Substituted by docker-entrypoint.sh (envsubst) — 4 virtual hosts
# Domains: DOMAIN_WWW, DOMAIN_ADMIN, DOMAIN_USER, DOMAIN_API

upstream camtraffic_backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (all hosts) ───────────────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN_WWW} ${DOMAIN_ROOT} ${DOMAIN_ADMIN} ${DOMAIN_USER} ${DOMAIN_API};
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www + apex → admin landing redirect ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN_WWW} ${DOMAIN_ROOT};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_ADMIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_ADMIN}/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    return 301 https://${DOMAIN_ADMIN}$request_uri;
}

# ── Admin portal SPA ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN_ADMIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_ADMIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_ADMIN}/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    root /usr/share/nginx/html/admin;
    index index.html;

    location /api/ {
        proxy_pass http://camtraffic_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://camtraffic_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health/ {
        proxy_pass http://camtraffic_backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── User portal SPA (driver + officer) ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN_USER};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_ADMIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_ADMIN}/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    root /usr/share/nginx/html/user;
    index index.html;

    location /api/ {
        proxy_pass http://camtraffic_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://camtraffic_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── API-only host ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN_API};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_ADMIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_ADMIN}/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    location / {
        proxy_pass http://camtraffic_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
