name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: camtraffic_db
          POSTGRES_USER: camtraffic
          POSTGRES_PASSWORD: camtraffic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U camtraffic -d camtraffic_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CAMTRAFFIC_ENV: development
      POSTGRES_DB: camtraffic_db
      POSTGRES_USER: camtraffic
      POSTGRES_PASSWORD: camtraffic
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Validate structure and environment
        run: npm run validate:all

      - name: Install Python test dependencies
        run: pip install -r backend/requirements.dev.txt

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend tests
        run: npm run test:frontend

      - name: Typecheck frontends
        run: npm run typecheck

  docker-build:
    runs-on: ubuntu-latest
    needs: validate-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build production backend image
        run: docker build -f deploy/docker/Dockerfile.backend.prod .

      - name: Build production nginx image
        run: docker build -f deploy/docker/Dockerfile.nginx.prod .
