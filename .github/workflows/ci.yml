name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-admin/package-lock.json
            frontend-user/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install root + frontend deps
        run: |
          npm ci
          npm run install:frontends

      - name: Validate structure
        run: npm run validate:structure

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Backend tests (Phase 12 subset)
        run: npm run test:backend:phase12

      - name: Frontend unit tests
        run: npm run test:frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build production images
        run: |
          docker build -f deploy/docker/Dockerfile.backend.prod -t camtraffic-backend:ci .
          docker build -f deploy/celery/Dockerfile.worker -t camtraffic-celery:ci .
          docker build -f deploy/docker/Dockerfile.ai-service.prod -t camtraffic-ai:ci .
