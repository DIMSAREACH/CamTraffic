# CamTraffic — local development & staging stack
# Usage: copy .env.docker.example → .env.docker, then:
#   docker compose --env-file .env.docker up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: camtraffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-camtraffic_db}
      POSTGRES_USER: ${DB_USER:-camtraffic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-camtraffic_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-camtraffic} -d ${DB_NAME:-camtraffic_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: camtraffic_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: camtraffic_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DOCKER: "1"
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./src/backend:/app/backend
      - ./src/backend/media:/app/backend/media
      - ./ai/weights:/app/ai/weights
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn camtraffic.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  ai-vision:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ai-vision
    container_name: camtraffic_ai_vision
    restart: unless-stopped
    environment:
      AI_MOCK_MODE: ${AI_VISION_MOCK_MODE:-false}
      AI_WEIGHTS_PATH: /app/ai/weights/best.pt
      AI_ROOT: /app/ai
      OCR_SERVICE_URL: http://ocr:8081
    volumes:
      - ./ai/weights:/app/ai/weights:ro
      - ./ai/sign_catalog.json:/app/ai/sign_catalog.json:ro
    ports:
      - "${AI_VISION_PORT:-8080}:8080"
    depends_on:
      ocr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  ocr:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ocr
    container_name: camtraffic_ocr
    restart: unless-stopped
    environment:
      OCR_MOCK_MODE: ${OCR_MOCK_MODE:-false}
    ports:
      - "${OCR_SERVICE_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  stream-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.stream-gateway
    container_name: camtraffic_stream_gateway
    restart: unless-stopped
    environment:
      STREAM_MOCK_MODE: ${STREAM_MOCK_MODE:-true}
      REDIS_URL: redis://redis:6379/2
      AI_VISION_SERVICE_URL: http://ai-vision:8080
      STREAM_AUTO_DETECT: ${STREAM_AUTO_DETECT:-false}
    ports:
      - "${STREAM_GATEWAY_PORT:-8082}:8082"
    depends_on:
      redis:
        condition: service_healthy
      ai-vision:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.celery
    container_name: camtraffic_celery
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DOCKER: "1"
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./src/backend/media:/app/backend/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  # Thesis-aligned AI service (YOLOv8 + EasyOCR) — port 8090
  ai-service:
    build:
      context: .
      dockerfile: src/services/ai-service/Dockerfile
    container_name: camtraffic_ai_service
    restart: unless-stopped
    environment:
      AI_MOCK_MODE: ${AI_SERVICE_MOCK_MODE:-true}
      AI_WEIGHTS_PATH: /weights/best.pt
      AI_SIGN_CATALOG_PATH: /ai/sign_catalog.json
      AI_HOST: 0.0.0.0
      AI_PORT: 8090
    volumes:
      - ./ai/weights:/weights:ro
      - ./ai/sign_catalog.json:/ai/sign_catalog.json:ro
      - ./src/services/ai-service/outputs:/app/outputs
    ports:
      - "${AI_SERVICE_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
